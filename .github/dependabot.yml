version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "@opennextjs/*"
          - "react*"
      chain:
        patterns:
          - "wagmi"
          - "viem"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
